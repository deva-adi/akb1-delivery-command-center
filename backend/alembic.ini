# AKB1 Delivery Command Center v1
# Alembic configuration. The DSN here is overridden by env.py at runtime;
# env.py reads DATABASE_URL_MIGRATIONS from the application settings so the
# migration always connects as akb1_owner (non-superuser, schema owner).
# Single source of truth lives in backend/app/config.py.

[alembic]
script_location = alembic
prepend_sys_path = .
file_template = %%(rev)s
sqlalchemy.url = postgresql+asyncpg://akb1_owner:akb1_owner_password@localhost:5432/akb1_dcc
output_encoding = utf-8
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
