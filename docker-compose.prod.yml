# AKB1 Delivery Command Center v1
# Production compose overlay
# Placeholder authored 2026-04-24. Real overlay populated at M8 before first hosted deploy.
#
# Usage (once populated):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from docker-compose.yml:
#   Caddy reverse proxy added for TLS termination
#   Ports not exposed to host (only through Caddy)
#   Resource limits applied
#   Restart policies set to always

version: "3.9"

services:
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

