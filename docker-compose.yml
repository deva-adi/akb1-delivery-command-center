# AKB1 Delivery Command Center v1
# Local development stack
# Slice 2.2 (M6): db plus redis plus backend
# Frontend service lands at M7
#
# Quick start:
#   cp .env.example .env       # only on first run
#   docker compose up -d db redis
#   docker compose ps          # confirm both healthy
#
# Notes:
#   docker-compose.yml at the project root is the single source of truth.
#   docker-compose.prod.yml ships in a later slice with TLS via Caddy.

name: akb1-dcc

services:
  db:
    image: postgres:16-alpine
    container_name: akb1_dcc_db
    environment:
      POSTGRES_USER: ${POSTGRES_BOOTSTRAP_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PASSWORD:-akb1_bootstrap_password}
      POSTGRES_DB: ${POSTGRES_DB:-akb1_dcc}
    volumes:
      - akb1_dcc_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${POSTGRES_BOOTSTRAP_USER:-postgres} -d ${POSTGRES_DB:-akb1_dcc}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: akb1_dcc_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - akb1_dcc_redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akb1_dcc_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+asyncpg://akb1_app:akb1_app_password@db:5432/akb1_dcc}
      DATABASE_URL_MIGRATIONS: ${DATABASE_URL_MIGRATIONS_DOCKER:-postgresql+asyncpg://akb1_owner:akb1_owner_password@db:5432/akb1_dcc}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-replace_with_long_random_string_before_deploy}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

volumes:
  akb1_dcc_postgres_data:
    name: akb1_dcc_postgres_data
  akb1_dcc_redis_data:
    name: akb1_dcc_redis_data
